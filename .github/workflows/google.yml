name: CI - Build and Update GitOps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  PROJECT_ID: project-40d105bf-bb2b-4bf6-b9f
  REGION: us-east5
  REPOSITORY: gcp-three-tier
  GITOPS_REPO: https://github.com/ashequrrasul/gke-three-tier-gitops.git
  GITOPS_BRANCH: main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          BACKEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:${{ github.sha }}
          docker build -t $BACKEND_IMAGE ./backend
          docker push $BACKEND_IMAGE
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Update backend image in GitOps repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/ashequrrasul/gke-three-tier-gitops.git gitops
          cd gitops

          sed -i "s|image: us-east5-docker.pkg.dev/project-40d105bf-bb2b-4bf6-b9f/gcp-three-tier/backend:.*|image: $BACKEND_IMAGE|g" k8s/backend-deployment.yaml

          git add backend-deployment.yaml
          git commit -m "Update backend image to ${{ github.sha }}" || echo "No backend image change"
          git push origin main

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build frontend image
        run: |
          FRONTEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:${{ github.sha }}
          docker build -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      - name: Update frontend image in GitOps repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/ashequrrasul/gke-three-tier-gitops.git gitops
          cd gitops

          sed -i "s|image: us-east5-docker.pkg.dev/project-40d105bf-bb2b-4bf6-b9f/gcp-three-tier/frontend:.*|image: $FRONTEND_IMAGE|g" k8s/frontend-deployment.yaml

          git add frontend-deployment.yaml
          git commit -m "Update frontend image to ${{ github.sha }}" || echo "No frontend image change"
          git push origin main